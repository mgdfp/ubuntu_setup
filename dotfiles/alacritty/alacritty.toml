[env]
TERM = "xterm-256color"

[shell]
program = "zellij"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaMono Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font", style = "Italic" }
size = 12

[window]
padding.x = 16
padding.y = 14
dynamic_padding = true
dimensions.columns = 121
dimensions.lines = 40
decorations = "full"
opacity = 0.98

[scrolling]
history = 10000

[colors]

[colors.primary]
background = '#1a1b26'
foreground = '#a9b1d6'

# Normal colors
[colors.normal]
black = '#32344a'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#ad8ee6'
cyan = '#449dab'
white = '#787c99'

# Bright colors
[colors.bright]
black = '#444b6a'
red = '#ff7a93'
green = '#b9f27c'
yellow = '#ff9e64'
blue = '#7da6ff'
magenta = '#bb9af7'
cyan = '#0db9d7'
white = '#acb0d0'

[colors.selection]
background = '#7aa2f7'
text = '#1a1b26'

# Cursor
[colors.cursor]
text = '#1a1b26'
cursor = '#c0caf5'


[colors.search.matches]
foreground = '#1a1b26'
background = '#ff9e64'

[colors.search.focused_match]
foreground = '#1a1b26'
background = '#9ece6a'

[colors.hints.start]
foreground = '#1a1b26'
background = '#e0af68'

[colors.hints.end]
foreground = '#1a1b26'
background = '#7aa2f7'

[colors.vi_mode_cursor]
text = '#1a1b26'
cursor = '#7aa2f7'
