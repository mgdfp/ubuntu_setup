[custom0]
binding='<Super>space'
command='ulauncher-toggle'
name='Ulauncher'

[custom1]
binding='<Shift><Super>s'
command='sh -c -- "flameshot gui"'
name='Flameshot'

[custom2]
binding='<Shift><Alt>2'
command='alacritty'
name='New Alacritty Window'

[custom3]
binding='<Shift><Alt>1'
command='google-chrome --new-window'
name='New Chrome Window'

[custom4]
binding='<Control>F1'
command="sh -c 'asdcontrol $(asdcontrol --detect /dev/usb/hiddev* 2>/dev/null | grep ^/dev/usb/hiddev | cut -d: -f1) -- -5000'"
name='Apple Brightness Down (ASDControl)'

[custom5]
binding='<Control>F2'
command="sh -c 'asdcontrol $(asdcontrol --detect /dev/usb/hiddev* 2>/dev/null | grep ^/dev/usb/hiddev | cut -d: -f1) -- +5000'"
name='Apple Brightness Up (ASDControl)'

[custom6]
binding='<Control><Shift>F2'
command="sh -c 'asdcontrol $(asdcontrol --detect /dev/usb/hiddev* 2>/dev/null | grep ^/dev/usb/hiddev | cut -d: -f1) -- +60000'"
name='Apple Brightness Max (ASDControl)'

[custom7]
binding='Launch1'
command='toggle_dark_light_theme.sh'
name='dark/light mode switcher'

[custom8]
binding='Launch3'
command='toggle_touchpad_on_off.sh'
name='touchpad on/off toggle'

[custom9]
binding='<Super>e'
command='nautilus --new-window'
name='open file explorer'
